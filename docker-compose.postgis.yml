services:
  postgres-postgis:
    image: postgis/postgis:15-3.3
    container_name: funnypixels-postgres-postgis
    environment:
      POSTGRES_DB: funnypixels_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password_here
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_postgis:/var/lib/postgresql/data
      - ./backend/data:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_postgis:
