global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'funnypixels'
    environment: 'production'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# 告警规则文件
rule_files:
  - "alerts.yml"

# 抓取配置
scrape_configs:
  # FunnyPixels 后端（运行在宿主机上）
  - job_name: 'funnypixels-backend'
    static_configs:
      - targets: ['host.docker.internal:3001']
        labels:
          app: 'funnypixels'
          component: 'backend'

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: 'prometheus'

  # Node Exporter (可选 - 用于系统指标)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
