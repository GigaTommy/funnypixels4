<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Emoji Atlas Generator v2 - 多源支持</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #2d3748;
        }
        .stat-label {
            font-size: 14px;
            color: #718096;
            margin-top: 5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }
        .progress-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        #atlasCanvas {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            display: none;
            margin: 20px auto;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .log-container {
            background: #1a202c;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-item {
            margin: 5px 0;
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
        }
        .log-success { color: #68d391; }
        .log-warning { color: #f6ad55; }
        .log-error { color: #fc8181; }
        .log-info { color: #63b3ed; }
        .source-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        .source-item {
            background: #f7fafc;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
        }
        .source-success { border-left: 4px solid #48bb78; }
        .source-error { border-left: 4px solid #f56565; }
        .source-warning { border-left: 4px solid #ed8936; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Emoji Atlas Generator v2</h1>
        <p class="subtitle">多源 Emoji 支持 + 本地缓存 + 错误恢复</p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalEmojis">0</div>
                <div class="stat-label">总 Emoji 数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="successfulLoads">0</div>
                <div class="stat-label">成功加载</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failedLoads">0</div>
                <div class="stat-label">加载失败</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="progress">0%</div>
                <div class="stat-label">进度</div>
            </div>
        </div>

        <div class="source-status" id="sourceStatus">
            <!-- 源状态将在这里显示 -->
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="controls">
            <button class="btn" id="generateBtn" onclick="generateAtlas()">生成 Emoji Atlas</button>
            <button class="btn btn-success" id="downloadPngBtn" onclick="downloadPNG()" disabled>下载 atlas.png</button>
            <button class="btn btn-success" id="downloadJsonBtn" onclick="downloadJSON()" disabled>下载 emoji_map.json</button>
        </div>

        <canvas id="atlasCanvas" width="4096" height="4096"></canvas>

        <div class="log-container" id="logContainer">
            <div class="log-item log-info">📋 Emoji Atlas Generator v2 已就绪</div>
            <div class="log-item log-info">🌐 支持多 CDN 源和本地资源</div>
            <div class="log-item log-info">🔄 自动错误恢复和降级策略</div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            atlasWidth: 4096,
            atlasHeight: 4096,
            emojiSize: 64,
            cols: 64,
            rows: 64,
            capacity: 4096
        };

        // Emoji CDN 源列表 - 按优先级排序
        const EMOJI_SOURCES = [
            {
                name: '本地资源',
                url: './assets/twemoji/{codepoint}.png',
                priority: 1
            },
            {
                name: 'Twemoji 官方 CDN',
                url: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/{codepoint}.png',
                priority: 2
            },
            {
                name: 'Twemoji jsDelivr',
                url: 'https://cdn.jsdelivr.net/npm/twemoji@14.0.2/assets/72x72/{codepoint}.png',
                priority: 3
            },
            {
                name: 'Twemoji Cloudflare',
                url: 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/{codepoint}.png',
                priority: 4
            },
            {
                name: 'Twemoji UNPKG',
                url: 'https://unpkg.com/twemoji@14.0.2/assets/72x72/{codepoint}.png',
                priority: 5
            },
            {
                name: 'EmojiOne 备用',
                url: 'https://cdn.jsdelivr.net/npm/emojione/assets/4.5/png/64/{codepoint}.png',
                priority: 6
            }
        ];

        // Emoji 列表 - 重点包含数据库需要的 emoji
        const EMOJI_LIST = {
            faces: ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '🙃', '😉', '😊'],
            emotions: ['😕', '😟', '🙁', '☹️', '😮', '😯', '😲', '😳', '🥺', '😦', '😧'],
            gestures: ['👋', '🤚', '🖐️', '✋', '👌', '🤏', '✌️', '🤞', '🤘', '🤙'],
            people: ['👶', '👧', '🧒', '👦', '👩', '🧑', '👨', '👵', '🧓', '👴', '👑'],
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐽', '🐸', '🐵', '🙈', '🙉', '🙊', '🐒', '🍃'],
            food: ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓'],
            drinks: ['🥛', '🍼', '☕', '🫖', '🍵', '🍶', '🍾', '🍷'],
            activities: ['⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🥏', '🎱', '🪀', '🏓', '🏸', '🏒', '🏑', '🥍', '🏏', '🪃', '🥅', '⛳', '🔥', '💧', '⚡', '✨', '💫', '⭐', '🌟', '☀️', '🌙', '☁️', '🌈', '❄️', '☔'],
            travel: ['🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑', '🚒', '🚐', '🛻', '🚚', '🚛', '🚜', '🚨', '🚔', '🚍', '🚘', '🚖', '🚡', '🚠', '🚟', '🚃', '🚋', '🚞', '🚝', '🚄', '🚅', '🚈', '🚂', '🚆', '🚇', '🚊', '🚉', '✈️', '🛫', '🛬', '🛩️', '💺', '🛰️', '🚀', '🛸', '🚁', '🛶', '⛵', '🚤', '🛥️', '🛳️', '⛴️', '🚢', '⚓', '🧭', '🌍'],
            objects: ['⌚', '📱', '📲', '💻', '⌨️', '🖥️', '🖨️', '🖱️', '🖲️', '🕹️'],
            symbols: ['❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❤️‍🔥'],
        };

        // 全局状态
        let atlasCanvas, ctx;
        let emojiMapData = null;
        let stats = {
            total: 0,
            successful: 0,
            failed: 0,
            sourceStats: {}
        };

        // 日志函数
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logItem.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(message);
        }

        // 更新统计显示
        function updateStats() {
            document.getElementById('totalEmojis').textContent = stats.total;
            document.getElementById('successfulLoads').textContent = stats.successful;
            document.getElementById('failedLoads').textContent = stats.failed;

            const progress = stats.total > 0 ? Math.round((stats.successful + stats.failed) / stats.total * 100) : 0;
            document.getElementById('progress').textContent = `${progress}%`;
            document.getElementById('progressBar').style.width = `${progress}%`;

            // 更新源状态
            updateSourceStatus();
        }

        // 更新源状态显示
        function updateSourceStatus() {
            const container = document.getElementById('sourceStatus');
            container.innerHTML = '';

            EMOJI_SOURCES.forEach(source => {
                const sourceStat = stats.sourceStats[source.name] || { success: 0, failed: 0 };
                const item = document.createElement('div');
                item.className = 'source-item';

                if (sourceStat.failed > 0 && sourceStat.success === 0) {
                    item.className += ' source-error';
                } else if (sourceStat.failed > 0) {
                    item.className += ' source-warning';
                } else if (sourceStat.success > 0) {
                    item.className += ' source-success';
                }

                item.innerHTML = `
                    <strong>${source.name}</strong><br>
                    ✅ ${sourceStat.success} | ❌ ${sourceStat.failed}
                `;
                container.appendChild(item);
            });
        }

        // 将 emoji 转换为 Unicode codepoint
        function getEmojiCodepoint(emoji) {
            return [...emoji]
                .map(c => c.codePointAt(0).toString(16))
                .join('-');
        }

        // 多源加载 emoji 图像
        async function loadEmojiImage(emoji) {
            const codepoint = getEmojiCodepoint(emoji);

            for (const source of EMOJI_SOURCES) {
                try {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';

                    const url = source.url.replace('{codepoint}', codepoint);

                    await new Promise((resolve, reject) => {
                        img.onload = () => resolve(img);
                        img.onerror = reject;
                        img.src = url;
                    });

                    // 成功加载
                    if (!stats.sourceStats[source.name]) {
                        stats.sourceStats[source.name] = { success: 0, failed: 0 };
                    }
                    stats.sourceStats[source.name].success++;

                    return img;

                } catch (error) {
                    // 记录失败
                    if (!stats.sourceStats[source.name]) {
                        stats.sourceStats[source.name] = { success: 0, failed: 0 };
                    }
                    stats.sourceStats[source.name].failed++;

                    log(`⚠️ ${emoji} 从 ${source.name} 加载失败: ${error.message}`, 'warning');

                    // 继续尝试下一个源
                    continue;
                }
            }

            // 所有源都失败，使用 Canvas fillText 作为最后备用
            log(`❌ ${emoji} 所有源都失败，使用 Canvas fillText`, 'error');
            stats.failed++;
            return null;
        }

        // 生成 Atlas
        async function generateAtlas() {
            log('🚀 开始生成 Emoji Atlas v2 (多源支持)...', 'info');

            const generateBtn = document.getElementById('generateBtn');
            generateBtn.disabled = true;

            // 重置统计
            stats = { total: 0, successful: 0, failed: 0, sourceStats: {} };
            updateStats();

            atlasCanvas = document.getElementById('atlasCanvas');
            ctx = atlasCanvas.getContext('2d', { willReadFrequently: true });

            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, CONFIG.atlasWidth, CONFIG.atlasHeight);

            // 收集所有 emoji
            const allEmojis = [];
            Object.entries(EMOJI_LIST).forEach(([category, emojis]) => {
                emojis.forEach(emoji => allEmojis.push({ category, emoji }));
            });

            stats.total = allEmojis.length;
            log(`📊 总共 ${allEmojis.length} 个 emoji，容量 ${CONFIG.capacity}`, 'info');

            // 初始化 emoji 映射数据
            emojiMapData = {
                meta: {
                    version: '2.0.0',
                    generated: new Date().toISOString(),
                    atlasSize: {
                        width: CONFIG.atlasWidth,
                        height: CONFIG.atlasHeight
                    },
                    emojiSize: CONFIG.emojiSize,
                    totalEmojis: allEmojis.length,
                    capacity: CONFIG.capacity,
                    generator: 'emoji-atlas-generator-v2',
                    sources: EMOJI_SOURCES.map(s => s.name)
                },
                emojis: {}
            };

            // 渲染每个 emoji
            for (let i = 0; i < allEmojis.length; i++) {
                const { category, emoji } = allEmojis[i];

                // 计算位置
                const col = i % CONFIG.cols;
                const row = Math.floor(i / CONFIG.cols);
                const x = col * CONFIG.emojiSize;
                const y = row * CONFIG.emojiSize;

                // 尝试加载 emoji 图像
                const img = await loadEmojiImage(emoji);

                if (img) {
                    // 渲染彩色图像
                    ctx.drawImage(img, x, y, CONFIG.emojiSize, CONFIG.emojiSize);
                    stats.successful++;
                } else {
                    // Fallback: 使用 Canvas fillText (灰色)
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const fontSize = CONFIG.emojiSize * 0.8;
                    ctx.font = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif`;
                    ctx.fillText(emoji, x + CONFIG.emojiSize / 2, y + CONFIG.emojiSize / 2);
                }

                // 计算 UV 坐标（归一化到 [0, 1]）
                const u0 = x / CONFIG.atlasWidth;
                const v0 = y / CONFIG.atlasHeight;
                const u1 = (x + CONFIG.emojiSize) / CONFIG.atlasWidth;
                const v1 = (y + CONFIG.emojiSize) / CONFIG.atlasHeight;

                // 保存映射数据
                const codepoint = getEmojiCodepoint(emoji);
                emojiMapData.emojis[emoji] = {
                    unicode: emoji,
                    codepoint: codepoint,
                    uv: { u0, v0, u1, v1 },
                    position: {
                        x,
                        y,
                        width: CONFIG.emojiSize,
                        height: CONFIG.emojiSize
                    },
                    index: i,
                    category,
                    loaded: !!img
                };

                // 更新进度
                updateStats();

                // 让浏览器有机会更新 UI
                if (i % 50 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            log('✅ Emoji Atlas v2 生成完成！', 'info');
            log(`📦 生成了 ${allEmojis.length} 个 emoji 到 ${CONFIG.atlasWidth}×${CONFIG.atlasHeight} 纹理`, 'info');
            log(`📊 成功: ${stats.successful}, 失败: ${stats.failed}`, 'info');

            // 显示画布
            atlasCanvas.style.display = 'block';

            // 启用下载按钮
            document.getElementById('downloadPngBtn').disabled = false;
            document.getElementById('downloadJsonBtn').disabled = false;

            log('💾 可以下载 atlas.png 和 emoji_map.json 了！', 'info');
            generateBtn.disabled = false;

            // 最终统计
            updateStats();
        }

        // 下载 PNG
        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'atlas-v2.png';
            link.href = atlasCanvas.toDataURL('image/png');
            link.click();
            log('📥 atlas-v2.png 下载完成', 'success');
        }

        // 下载 JSON
        function downloadJSON() {
            const blob = new Blob([JSON.stringify(emojiMapData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = 'emoji_map-v2.json';
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
            log('📥 emoji_map-v2.json 下载完成', 'success');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            log('🌐 初始化 Emoji Atlas Generator v2...', 'info');
            log(`📋 支持 ${EMOJI_SOURCES.length} 个 CDN/本地源`, 'info');

            // 检查本地资源可用性
            fetch('./assets/twemoji/emoji-local-map.json')
                .then(response => {
                    if (response.ok) {
                        log('✅ 检测到本地 Twemoji 资源', 'success');
                    } else {
                        log('⚠️ 未检测到本地 Twemoji 资源，将使用 CDN', 'warning');
                    }
                })
                .catch(() => {
                    log('⚠️ 未检测到本地 Twemoji 资源，将使用 CDN', 'warning');
                });

            updateStats();
        });
    </script>
</body>
</html>
