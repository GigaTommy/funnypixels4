# Production MVT + Sprite Configuration
# Place in: /etc/nginx/conf.d/mvt-config.conf

# Gzip configuration
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types application/x-protobuf application/json image/png;

# Brotli configuration (requires ngx_brotli module)
# Install: https://github.com/google/ngx_brotli
brotli on;
brotli_comp_level 6;
brotli_types application/x-protobuf application/json image/png;

# Cache zones
proxy_cache_path /var/cache/nginx/mvt levels=1:2 keys_zone=mvt_cache:100m max_size=1g inactive=7d use_temp_path=off;
proxy_cache_path /var/cache/nginx/sprites levels=1:2 keys_zone=sprite_cache:50m max_size=500m inactive=30d use_temp_path=off;

server {
    listen 80;
    server_name your-domain.com;

    # MVT Tile endpoint
    location ~ ^/api/tiles/pixels/(\d+)/(\d+)/(\d+)\.pbf$ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;

        # Cache headers
        proxy_cache mvt_cache;
        proxy_cache_key "$uri$is_args$args";
        proxy_cache_valid 200 1h;
        proxy_cache_valid 204 10m;  # Empty tiles cached shorter
        proxy_cache_valid 404 1m;

        # ETag support
        proxy_cache_revalidate on;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # Sprite endpoint
    location ~ ^/api/sprites/icon/(\d+)/(emoji|complex)/(.+)\.png$ {
        proxy_pass http://backend:3001;

        # Aggressive caching (immutable sprites)
        proxy_cache sprite_cache;
        proxy_cache_key "$uri";
        proxy_cache_valid 200 365d;

        # Immutable header
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Cache stats endpoint (admin only)
    location /api/tiles/pixels/cache/stats {
        proxy_pass http://backend:3001;
        allow 127.0.0.1;
        allow 10.0.0.0/8;  # Adjust to your admin network
        deny all;
    }
}
