# FunnyPixels Production Nginx Configuration
# Cloudflare → Nginx (Origin) → Docker Backend
#
# Setup:
#   cp deploy/nginx.conf /etc/nginx/sites-available/funnypixels
#   ln -s /etc/nginx/sites-available/funnypixels /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#
# Prerequisites:
#   - Cloudflare Origin Certificate at /etc/ssl/cloudflare/funnypixels.{pem,key}
#   - Cloudflare SSL mode: Full (Strict)

# Log format with Cloudflare real IP
log_format funnypixels '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       '"$http_cf_connecting_ip" $request_time';

upstream backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# ==========================================
# Cloudflare Real IP Restoration
# https://www.cloudflare.com/ips/
# ==========================================
# IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# ==========================================
# SSL Certificate (Cloudflare Origin Certificate)
# ==========================================
ssl_certificate     /etc/ssl/cloudflare/funnypixels.pem;
ssl_certificate_key /etc/ssl/cloudflare/funnypixels.key;
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers HIGH:!aNULL:!MD5;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;

# ==========================================
# HTTP → HTTPS Redirect
# ==========================================
server {
    listen 80;
    server_name api.funnypixelsapp.com admin.funnypixelsapp.com monitor.funnypixelsapp.com;
    return 301 https://$host$request_uri;
}

# ==========================================
# API Backend (api.funnypixelsapp.com)
# ==========================================
server {
    listen 443 ssl http2;
    server_name api.funnypixelsapp.com;

    access_log /var/log/nginx/funnypixels_api_access.log funnypixels;
    error_log /var/log/nginx/funnypixels_api_error.log;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size limit
    client_max_body_size 50M;

    # Gzip (Cloudflare also compresses, but this helps origin→CF transfer)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # Health check (no logging)
    location = /api/health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Cloudflare idle timeout is 100s; keep below that
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Sprite/icon assets (cacheable via Cloudflare)
    location /api/sprites/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded files (cacheable via Cloudflare)
    location /uploads/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Catch-all → backend
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}

# ==========================================
# Admin Frontend (admin.funnypixelsapp.com)
# ==========================================
server {
    listen 443 ssl http2;
    server_name admin.funnypixelsapp.com;

    access_log /var/log/nginx/funnypixels_admin_access.log funnypixels;
    error_log /var/log/nginx/funnypixels_admin_error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Admin UI (container serves on port 8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Admin API calls → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}

# ==========================================
# Grafana Monitoring (monitor.funnypixelsapp.com)
# Protected by Cloudflare Access or IP whitelist
# ==========================================
server {
    listen 443 ssl http2;
    server_name monitor.funnypixelsapp.com;

    access_log /var/log/nginx/funnypixels_monitor_access.log funnypixels;
    error_log /var/log/nginx/funnypixels_monitor_error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support for Grafana live
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
