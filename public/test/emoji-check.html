<!DOCTYPE html>
<html>
<head>
    <title>Emoji Atlas 文件检查</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        img { max-width: 400px; height: auto; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>🔥 Emoji Atlas 文件检查</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');

        // 检查文件函数
        function checkFile(filePath, description) {
            return fetch(filePath)
                .then(response => {
                    if (response.ok) {
                        return response.blob().then(blob => {
                            const result = document.createElement('div');
                            result.className = 'result success';
                            result.innerHTML = `✅ ${description}: 成功 (${(blob.size / 1024).toFixed(1)}KB)`;
                            results.appendChild(result);
                            return { success: true, blob, response };
                        });
                    } else {
                        const result = document.createElement('div');
                        result.className = 'result error';
                        result.innerHTML = `❌ ${description}: 失败 (HTTP ${response.status})`;
                        results.appendChild(result);
                        return { success: false };
                    }
                })
                .catch(error => {
                    const result = document.createElement('div');
                    result.className = 'result error';
                    result.innerHTML = `❌ ${description}: 网络错误 (${error.message})`;
                    results.appendChild(result);
                    return { success: false };
                });
        }

        // 检查emoji map
        function checkEmojiMap() {
            return fetch('../assets/emoji/emoji_map.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    const result = document.createElement('div');
                    result.className = 'result success';
                    result.innerHTML = `✅ Emoji Map: 加载成功 (${data.meta.totalEmojis} 个emoji)`;
                    results.appendChild(result);

                    // 检查🔥
                    if (data.emojis['🔥']) {
                        const fire = data.emojis['🔥'];
                        const result2 = document.createElement('div');
                        result2.className = 'result success';
                        result2.innerHTML = `✅ 🔥 找到: key=${fire.key}, UV=(${fire.uv.u0.toFixed(4)}, ${fire.uv.v0.toFixed(4)})`;
                        results.appendChild(result2);
                    } else {
                        const result2 = document.createElement('div');
                        result2.className = 'result error';
                        result2.innerHTML = `❌ 🔥 未在emoji_map.json中找到`;
                        results.appendChild(result2);
                    }

                    return data;
                })
                .catch(error => {
                    const result = document.createElement('div');
                    result.className = 'result error';
                    result.innerHTML = `❌ Emoji Map: 加载失败 (${error.message})`;
                    results.appendChild(result);
                    return null;
                });
        }

        // 测试atlas图片显示
        function testAtlasImage(atlasBlob) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(atlasBlob);
            img.alt = 'Atlas Preview';

            const container = document.createElement('div');
            container.className = 'result info';
            container.innerHTML = '<strong>Atlas预览 (显示左上角区域):</strong>';
            container.appendChild(img);
            results.appendChild(container);
        }

        // 主测试函数
        async function runTests() {
            results.innerHTML = '<div class="result info">🔄 开始检查...</div>';

            // 检查atlas文件
            const atlasResult = await checkFile('../assets/emoji/atlas.png', 'Atlas PNG');

            // 检查emoji map
            const mapData = await checkEmojiMap();

            // 如果atlas加载成功，显示预览
            if (atlasResult && atlasResult.success) {
                testAtlasImage(atlasResult.blob);
            }

            // 总结
            const summary = document.createElement('div');
            summary.className = 'result info';
            summary.innerHTML = `
                <strong>📊 检查总结:</strong><br>
                - Atlas文件: ${atlasResult && atlasResult.success ? '✅ 正常' : '❌ 异常'}<br>
                - Emoji Map: ${mapData ? '✅ 正常' : '❌ 异常'}<br>
                - 🔥 emoji: ${mapData && mapData.emojis['🔥'] ? '✅ 找到' : '❌ 未找到'}
            `;
            results.appendChild(summary);
        }

        // 页面加载完成后运行测试
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
