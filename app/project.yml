name: FunnyPixels
options:
  bundleIdPrefix: com.funnypixels
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.8.0
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift.git
    from: 16.0.1
  Realm:
    url: https://github.com/realm/realm-swift.git
    from: 10.42.0
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 7.9.0
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: 4.2.2
  SwiftDependencies:
    url: https://github.com/pointfreeco/swift-dependencies.git
    from: 1.0.0
  SwiftLog:
    url: https://github.com/apple/swift-log.git
    from: 1.5.3
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture.git
    exactVersion: 1.16.0
  MapLibre:
    url: https://github.com/maplibre/maplibre-gl-native-distribution.git
    from: 6.0.0

targets:
  FunnyPixelsLib:
    type: framework
    platform: iOS
    sources:
      - FunnyPixels/Sources/FunnyPixels
    dependencies:
      - package: Alamofire
      - package: SocketIO
      - package: Realm
        product: RealmSwift
      - package: Kingfisher
      - package: KeychainAccess
      - package: SwiftDependencies
        product: Dependencies
      - package: SwiftLog
        product: Logging
      - package: ComposableArchitecture
      - package: MapLibre

  FunnyPixelsApp:
    type: application
    platform: iOS
    sources:
      - FunnyPixels/Sources/FunnyPixelsApp
    info:
      path: FunnyPixels/Sources/FunnyPixelsApp/Info.plist
      properties:
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: FunnyPixels
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleDevelopmentRegion: en
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocationWhenInUseUsageDescription: "We need your location to show pixels on the map"
        NSLocationAlwaysAndWhenInUseUsageDescription: "We need your location to show pixels on the map"
    dependencies:
      - target: FunnyPixelsLib
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.funnypixels.app
        INFOPLIST_FILE: FunnyPixels/Sources/FunnyPixelsApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
