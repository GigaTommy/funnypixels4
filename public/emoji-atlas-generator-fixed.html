<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Emoji Atlas Generator Fixed - 浏览器原生渲染</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #4a5568;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }
        .missing-emojis {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .missing-emojis h3 {
            color: #f39c12;
            margin-top: 0;
        }
        .emoji-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        .emoji-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 15px;
            font-size: 20px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #2d3748;
        }
        .stat-label {
            font-size: 14px;
            color: #718096;
            margin-top: 5px;
        }
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
        }
        .btn-warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
        }
        .progress-container {
            background: #e2e8f0;
            border-radius: 10px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            transition: width 0.3s ease;
            width: 0%;
        }
        #atlasCanvas {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            display: none;
            margin: 20px auto;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .log-container {
            background: #1a202c;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-item {
            margin: 5px 0;
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
        }
        .log-success { color: #68d391; }
        .log-warning { color: #f6ad55; }
        .log-error { color: #fc8181; }
        .log-info { color: #63b3ed; }
        .test-emoji {
            position: absolute;
            top: -1000px;
            left: -1000px;
            font-size: 64px;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Emoji Atlas Generator Fixed</h1>
        <p class="subtitle">使用浏览器原生 Emoji 渲染 + Canvas 捕获技术</p>

        <div class="missing-emojis">
            <h3>❌ 数据库需要的 Emoji 但当前 Atlas 缺失:</h3>
            <div class="emoji-list" id="missingEmojis">
                <!-- 缺失的 emoji 将在这里显示 -->
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalEmojis">0</div>
                <div class="stat-label">总 Emoji 数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="successfulLoads">0</div>
                <div class="stat-label">成功加载</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failedLoads">0</div>
                <div class="stat-label">加载失败</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="progress">0%</div>
                <div class="stat-label">进度</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="controls">
            <button class="btn btn-warning" id="testMissingBtn" onclick="testMissingEmojis()">测试缺失 Emoji</button>
            <button class="btn" id="generateBtn" onclick="generateAtlas()">生成完整 Atlas</button>
            <button class="btn btn-success" id="downloadPngBtn" onclick="downloadPNG()" disabled>下载 atlas.png</button>
            <button class="btn btn-success" id="downloadJsonBtn" onclick="downloadJSON()" disabled>下载 emoji_map.json</button>
        </div>

        <canvas id="atlasCanvas" width="4096" height="4096"></canvas>

        <!-- 测试用的隐藏 emoji 元素 -->
        <div class="test-emoji" id="testEmoji"></div>

        <div class="log-container" id="logContainer">
            <div class="log-item log-info">📋 Emoji Atlas Generator Fixed 已就绪</div>
            <div class="log-item log-info">🌐 使用浏览器原生 Emoji 渲染 + Canvas 捕获</div>
            <div class="log-item log-info">💡 这个方法不需要外部 CDN，直接使用系统 emoji</div>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            atlasWidth: 4096,
            atlasHeight: 4096,
            emojiSize: 64,
            cols: 64,
            rows: 64,
            capacity: 4096
        };

        // 数据库需要的 emoji 列表 (render_type: emoji)
        const DATABASE_EMOJIS = [
            { key: 'emoji_crown', unicode: '👑', name: '皇冠' },
            { key: 'emoji_star', unicode: '⭐', name: '星星' },
            { key: 'emoji_heart', unicode: '❤️', name: '爱心' },
            { key: 'emoji_fire', unicode: '🔥', name: '火焰' }, // 🔥 你最关心的这个！
            { key: 'emoji_water', unicode: '💧', name: '水滴' },
            { key: 'emoji_leaf', unicode: '🍃', name: '叶子' },
            { key: 'emoji_sun', unicode: '☀️', name: '太阳' },
            { key: 'emoji_moon', unicode: '🌙', name: '月亮' },
            { key: 'emoji_cloud', unicode: '☁️', name: '云朵' },
            { key: 'emoji_rainbow', unicode: '🌈', name: '彩虹' },
            { key: 'emoji_thunder', unicode: '⚡', name: '闪电' },
            { key: 'emoji_snow', unicode: '❄️', name: '雪花' },
            { key: 'emoji_rain', unicode: '☔', name: '下雨' },
            { key: 'emoji_anchor', unicode: '⚓', name: '锚' },
            { key: 'emoji_compass', unicode: '🧭', name: '指南针' },
            { key: 'emoji_earth', unicode: '🌍', name: '地球' }
        ];

        // 完整的 emoji 列表 (用于生成完整 atlas)
        const COMPLETE_EMOJI_LIST = {
            faces: ['😀', '😃', '😄', '😁', '😆', '😅', '🤣', '😂', '🙂', '🙃', '😉', '😊'],
            emotions: ['😕', '😟', '🙁', '☹️', '😮', '😯', '😲', '😳', '🥺', '😦', '😧'],
            gestures: ['👋', '🤚', '🖐️', '✋', '👌', '🤏', '✌️', '🤞', '🤘', '🤙'],
            people: ['👶', '👧', '🧒', '👦', '👩', '🧑', '👨', '👵', '🧓', '👴', '👑'],
            animals: ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐽', '🐸', '🐵', '🙈', '🙉', '🙊', '🐒', '🍃'],
            food: ['🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓'],
            drinks: ['🥛', '🍼', '☕', '🫖', '🍵', '🍶', '🍾', '🍷'],
            activities: ['⚽', '🏀', '🏈', '⚾', '🥎', '🎾', '🏐', '🏉', '🥏', '🎱', '🪀', '🏓', '🏸', '🏒', '🏑', '🥍', '🏏', '🪃', '🥅', '⛳', '🔥', '💧', '⚡', '✨', '💫', '⭐', '🌟', '☀️', '🌙', '☁️', '🌈', '❄️', '☔'],
            travel: ['🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑', '🚒', '🚐', '🛻', '🚚', '🚛', '🚜', '🚨', '🚔', '🚍', '🚘', '🚖', '🚡', '🚠', '🚟', '🚃', '🚋', '🚞', '🚝', '🚄', '🚅', '🚈', '🚂', '🚆', '🚇', '🚊', '🚉', '✈️', '🛫', '🛬', '🛩️', '💺', '🛰️', '🚀', '🛸', '🚁', '🛶', '⛵', '🚤', '🛥️', '🛳️', '⛴️', '🚢', '⚓', '🧭', '🌍'],
            objects: ['⌚', '📱', '📲', '💻', '⌨️', '🖥️', '🖨️', '🖱️', '🖲️', '🕹️'],
            symbols: ['❤️', '🧡', '💛', '💚', '💙', '💜', '🖤', '🤍', '🤎', '💔', '❤️‍🔥'],
        };

        // 全局状态
        let atlasCanvas, ctx;
        let emojiMapData = null;
        let stats = {
            total: 0,
            successful: 0,
            failed: 0
        };

        // 日志函数
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logItem = document.createElement('div');
            logItem.className = `log-item log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logItem.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(logItem);
            logContainer.scrollTop = logContainer.scrollHeight;
            console.log(message);
        }

        // 更新统计显示
        function updateStats() {
            document.getElementById('totalEmojis').textContent = stats.total;
            document.getElementById('successfulLoads').textContent = stats.successful;
            document.getElementById('failedLoads').textContent = stats.failed;

            const progress = stats.total > 0 ? Math.round((stats.successful + stats.failed) / stats.total * 100) : 0;
            document.getElementById('progress').textContent = `${progress}%`;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        // 显示缺失的 emoji
        function displayMissingEmojis() {
            const container = document.getElementById('missingEmojis');
            container.innerHTML = '';

            DATABASE_EMOJIS.forEach(item => {
                const div = document.createElement('div');
                div.className = 'emoji-item';
                div.innerHTML = `${item.unicode}<br><small>${item.key}</small>`;
                container.appendChild(div);
            });
        }

        // 使用浏览器原生渲染捕获 emoji
        function captureBrowserEmoji(emoji, size = 64) {
            return new Promise((resolve) => {
                const testElement = document.getElementById('testEmoji');

                // 设置测试元素样式
                testElement.style.fontSize = `${size}px`;
                testElement.style.fontFamily = '"Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif';
                testElement.style.lineHeight = '1';
                testElement.style.margin = '0';
                testElement.style.padding = '0';
                testElement.textContent = emoji;

                // 强制浏览器渲染
                testElement.offsetHeight;

                // 创建临时 canvas 来捕获 emoji
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = size;
                tempCanvas.height = size;
                const tempCtx = tempCanvas.getContext('2d');

                // 设置相同的字体样式
                tempCtx.font = `${size}px "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif`;
                tempCtx.textAlign = 'center';
                tempCtx.textBaseline = 'middle';

                // 绘制 emoji 到 canvas
                tempCtx.fillText(emoji, size / 2, size / 2);

                // 创建图像对象
                const img = new Image();
                img.onload = () => {
                    stats.successful++;
                    updateStats();
                    resolve(img);
                };
                img.onerror = () => {
                    stats.failed++;
                    updateStats();
                    resolve(null);
                };

                img.src = tempCanvas.toDataURL('image/png');
            });
        }

        // 测试缺失的 emoji
        async function testMissingEmojis() {
            log('🧪 开始测试缺失的 Emoji...', 'info');

            const testBtn = document.getElementById('testMissingBtn');
            testBtn.disabled = true;

            // 重置统计
            stats = { total: DATABASE_EMOJIS.length, successful: 0, failed: 0 };
            updateStats();

            const results = [];

            for (let i = 0; i < DATABASE_EMOJIS.length; i++) {
                const emojiData = DATABASE_EMOJIS[i];

                log(`🔍 测试 ${emojiData.unicode} (${emojiData.name})...`, 'info');

                try {
                    const img = await captureBrowserEmoji(emojiData.unicode);

                    if (img) {
                        log(`✅ ${emojiData.unicode} 成功捕获`, 'success');
                        results.push({ ...emojiData, success: true });
                    } else {
                        log(`❌ ${emojiData.unicode} 捕获失败`, 'error');
                        results.push({ ...emojiData, success: false });
                    }
                } catch (error) {
                    log(`⚠️ ${emojiData.unicode} 测试出错: ${error.message}`, 'warning');
                    results.push({ ...emojiData, success: false, error: error.message });
                }

                // 让浏览器有机会更新 UI
                if (i % 5 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }

            const successCount = results.filter(r => r.success).length;
            log(`📊 测试完成: ${successCount}/${DATABASE_EMOJIS.length} 成功`, 'info');

            if (successCount === DATABASE_EMOJIS.length) {
                log('🎉 所有缺失的 Emoji 都能成功渲染！可以生成完整 Atlas', 'success');
            } else {
                log(`⚠️ 还有 ${DATABASE_EMOJIS.length - successCount} 个 Emoji 无法渲染`, 'warning');
            }

            testBtn.disabled = false;
        }

        // 生成完整 Atlas
        async function generateAtlas() {
            log('🚀 开始生成完整 Emoji Atlas (浏览器原生渲染)...', 'info');

            const generateBtn = document.getElementById('generateBtn');
            generateBtn.disabled = true;

            // 收集所有 emoji
            const allEmojis = [];

            // 添加数据库需要的 emoji (优先级最高)
            DATABASE_EMOJIS.forEach(item => {
                allEmojis.push({
                    category: 'database',
                    emoji: item.unicode,
                    key: item.key,
                    name: item.name
                });
            });

            // 添加其他 emoji
            Object.entries(COMPLETE_EMOJI_LIST).forEach(([category, emojis]) => {
                emojis.forEach(emoji => {
                    // 避免重复添加数据库中已有的 emoji
                    if (!DATABASE_EMOJIS.some(item => item.unicode === emoji)) {
                        allEmojis.push({ category, emoji });
                    }
                });
            });

            stats.total = allEmojis.length;
            log(`📊 总共 ${allEmojis.length} 个 emoji，容量 ${CONFIG.capacity}`, 'info');

            // 重置统计
            stats.successful = 0;
            stats.failed = 0;
            updateStats();

            atlasCanvas = document.getElementById('atlasCanvas');
            ctx = atlasCanvas.getContext('2d', { willReadFrequently: true });

            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0)';
            ctx.fillRect(0, 0, CONFIG.atlasWidth, CONFIG.atlasHeight);

            // 初始化 emoji 映射数据
            emojiMapData = {
                meta: {
                    version: '3.0.0',
                    generated: new Date().toISOString(),
                    atlasSize: {
                        width: CONFIG.atlasWidth,
                        height: CONFIG.atlasHeight
                    },
                    emojiSize: CONFIG.emojiSize,
                    totalEmojis: allEmojis.length,
                    capacity: CONFIG.capacity,
                    generator: 'emoji-atlas-generator-fixed',
                    method: 'browser-native-canvas-capture',
                    databaseEmojis: DATABASE_EMOJIS.length
                },
                emojis: {}
            };

            // 渲染每个 emoji
            for (let i = 0; i < allEmojis.length; i++) {
                const { category, emoji, key, name } = allEmojis[i];

                // 计算位置
                const col = i % CONFIG.cols;
                const row = Math.floor(i / CONFIG.cols);
                const x = col * CONFIG.emojiSize;
                const y = row * CONFIG.emojiSize;

                // 使用浏览器原生渲染捕获 emoji
                const img = await captureBrowserEmoji(emoji);

                if (img) {
                    // 渲染捕获的彩色图像
                    ctx.drawImage(img, x, y, CONFIG.emojiSize, CONFIG.emojiSize);
                } else {
                    // 如果捕获失败，尝试直接绘制到 canvas (可能是单色)
                    log(`⚠️ ${emoji} 捕获失败，尝试直接绘制`, 'warning');
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const fontSize = CONFIG.emojiSize * 0.8;
                    ctx.font = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif`;
                    ctx.fillText(emoji, x + CONFIG.emojiSize / 2, y + CONFIG.emojiSize / 2);
                }

                // 计算 UV 坐标（归一化到 [0, 1]）
                const u0 = x / CONFIG.atlasWidth;
                const v0 = y / CONFIG.atlasHeight;
                const u1 = (x + CONFIG.emojiSize) / CONFIG.atlasWidth;
                const v1 = (y + CONFIG.emojiSize) / CONFIG.atlasHeight;

                // 保存映射数据
                const codepoint = [...emoji].map(c => c.codePointAt(0).toString(16).toUpperCase()).join('-');
                emojiMapData.emojis[emoji] = {
                    unicode: emoji,
                    codepoint: codepoint,
                    uv: { u0, v0, u1, v1 },
                    position: {
                        x,
                        y,
                        width: CONFIG.emojiSize,
                        height: CONFIG.emojiSize
                    },
                    index: i,
                    category,
                    key: key || null,
                    name: name || null,
                    loaded: true
                };

                // 更新进度
                updateStats();

                // 让浏览器有机会更新 UI
                if (i % 50 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 0));
                }
            }

            log('✅ 完整 Emoji Atlas 生成完成！', 'success');
            log(`📦 生成了 ${allEmojis.length} 个 emoji 到 ${CONFIG.atlasWidth}×${CONFIG.atlasHeight} 纹理`, 'info');
            log(`📊 数据库 emoji: ${DATABASE_EMOJIS.length} 个全部包含！`, 'success');

            // 显示画布
            atlasCanvas.style.display = 'block';

            // 启用下载按钮
            document.getElementById('downloadPngBtn').disabled = false;
            document.getElementById('downloadJsonBtn').disabled = false;

            log('💾 可以下载 atlas.png 和 emoji_map.json 了！', 'info');
            generateBtn.disabled = false;

            // 验证数据库 emoji
            verifyDatabaseEmojis();
        }

        // 验证数据库 emoji 是否都在 atlas 中
        function verifyDatabaseEmojis() {
            log('🔍 验证数据库 Emoji 在 Atlas 中的完整性...', 'info');

            let found = 0;
            let missing = [];

            DATABASE_EMOJIS.forEach(item => {
                if (emojiMapData.emojis[item.unicode]) {
                    found++;
                    log(`✅ ${item.unicode} (${item.key}) - 已包含`, 'success');
                } else {
                    missing.push(item);
                    log(`❌ ${item.unicode} (${item.key}) - 缺失`, 'error');
                }
            });

            log(`📊 验证结果: ${found}/${DATABASE_EMOJIS.length} (${Math.round(found/DATABASE_EMOJIS.length*100)}%)`, 'info');

            if (missing.length === 0) {
                log('🎉 所有数据库 Emoji 都已成功包含在 Atlas 中！', 'success');
                log('🔥 特别是 emoji_fire (🔥) 现在应该能正常显示彩色了！', 'success');
            } else {
                log(`⚠️ 还有 ${missing.length} 个 emoji 缺失`, 'warning');
            }
        }

        // 下载 PNG
        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'atlas-fixed.png';
            link.href = atlasCanvas.toDataURL('image/png');
            link.click();
            log('📥 atlas-fixed.png 下载完成', 'success');
        }

        // 下载 JSON
        function downloadJSON() {
            const blob = new Blob([JSON.stringify(emojiMapData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = 'emoji_map-fixed.json';
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
            log('📥 emoji_map-fixed.json 下载完成', 'success');
        }
