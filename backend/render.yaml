services:
  - type: web
    name: funnypixels-backend
    env: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://funnypixels.pages.dev
      - key: FRONTEND_URL
        value: https://funnypixels.pages.dev
      # 数据库配置
      - key: DB_HOST
        fromDatabase:
          name: funnypixels-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: funnypixels-postgres
          property: port
      - key: DB_USER
        fromDatabase:
          name: funnypixels-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: funnypixels-postgres
          property: password
      - key: DB_NAME
        fromDatabase:
          name: funnypixels-postgres
          property: database
      # Redis配置 (Upstash)
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      # 性能优化配置
      - key: REDIS_BATCH_SIZE
        value: 100
      - key: REDIS_FLUSH_INTERVAL
        value: 300000
      - key: TILE_BATCH_TIMEOUT
        value: 50
      - key: TILE_CACHE_TTL
        value: 3600
      - key: LEADERBOARD_CACHE_TTL
        value: 600
      - key: STREAM_CACHE_TTL
        value: 86400
      - key: MAX_CONCURRENT_CONNECTIONS
        value: 1000
      - key: WEBSOCKET_HEARTBEAT_INTERVAL
        value: 30000
      - key: TILE_SUBSCRIPTION_DEBOUNCE
        value: 100
      - key: VIEWPORT_UPDATE_THROTTLE
        value: 200
      # 监控配置
      - key: ENABLE_PERFORMANCE_MONITORING
        value: true
      - key: PERFORMANCE_LOG_INTERVAL
        value: 60000
      - key: REDIS_MEMORY_ALERT_THRESHOLD
        value: 50
      # 支付配置
      - key: PAYMENT_MODE
        value: production
      - key: WECHAT_APP_ID
        sync: false
      - key: WECHAT_MCH_ID
        sync: false
      - key: WECHAT_API_KEY
        sync: false
      - key: ALIPAY_APP_ID
        sync: false
      - key: ALIPAY_PRIVATE_KEY
        sync: false
      - key: ALIPAY_PUBLIC_KEY
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: funnypixels-postgres
    databaseName: funnypixels_prod
    user: funnypixels_prod_user
    plan: starter
