# FunnyPixels Production Docker Compose
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: funnypixels_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-funnypixels_postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /data/funnypixels/postgres:/var/lib/postgresql/data
    networks:
      - funnypixels_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-funnypixels_postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    shm_size: '256mb'

  redis:
    image: redis:7-alpine
    container_name: funnypixels_redis_prod
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - /data/funnypixels/redis:/data
    networks:
      - funnypixels_prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: funnypixels_backend_prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - /data/funnypixels/logs:/app/logs
      - /data/funnypixels/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - funnypixels_prod
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.request({hostname:'localhost',port:3001,path:'/api/health',timeout:5000}, res => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.end()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G

  admin-frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    container_name: funnypixels_admin_prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    networks:
      - funnypixels_prod
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: funnypixels_prometheus_prod
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.production.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    networks:
      - funnypixels_prod
    deploy:
      resources:
        limits:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: funnypixels_alertmanager_prod
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.production.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - funnypixels_prod
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:10.2.0
    container_name: funnypixels_grafana_prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://monitor.funnypixelsapp.com
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - funnypixels_prod
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  funnypixels_prod:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
