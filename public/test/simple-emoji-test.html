<!DOCTYPE html>
<html>
<head>
    <title>Simple Emoji Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔥 简单Emoji Atlas测试</h1>

    <div class="section">
        <h2>📂 文件结构检查</h2>
        <div id="file-check">检查中...</div>
    </div>

    <div class="section">
        <h2>🔥 Emoji Map内容检查</h2>
        <div id="emoji-check">检查中...</div>
    </div>

    <div class="section">
        <h2>🖼️ Atlas图片信息</h2>
        <div id="atlas-info">检查中...</div>
    </div>

    <script>
        // 显示emoji map的内容 - 直接使用Node.js创建的变量
        window.EMOJI_MAP_DATA = null;
        window.ATLAS_EXISTS = false;

        // 模拟检查文件存在
        function checkFiles() {
            const fileCheck = document.getElementById('file-check');
            fileCheck.innerHTML = `
                <div class="info">📁 检查路径: C:\\Users\\GinoChow\\web3\\funnypixels\\public\\assets\\emoji\\</div>
                <div class="info">📋 需要的文件:</div>
                <ul>
                    <li>atlas.png</li>
                    <li>emoji_map.json</li>
                </ul>
                <div class="success">✅ 如果这个页面能正常显示，说明HTML文件路径正确</div>
            `;
        }

        // 手动加载emoji map数据
        function loadEmojiMapData() {
            const emojiCheck = document.getElementById('emoji-check');

            // 这里直接使用预定义的数据（如果文件无法通过HTTP访问）
            const sampleEmojiMap = {
                meta: {
                    version: "3.0.0",
                    generated: "2025-11-25T06:59:18.258Z",
                    totalEmojis: 188,
                    generator: "emoji-atlas-generator-fixed"
                },
                emojis: {
                    "👑": { key: "emoji_crown", uv: { u0: 0, v0: 0, u1: 0.015625, v1: 0.015625 } },
                    "⭐": { key: "emoji_star", uv: { u0: 0.015625, v0: 0, u1: 0.03125, v1: 0.015625 } },
                    "❤️": { key: "emoji_heart", uv: { u0: 0.03125, v0: 0, u1: 0.046875, v1: 0.015625 } },
                    "🔥": { key: "emoji_fire", uv: { u0: 0.046875, v0: 0, u1: 0.0625, v1: 0.015625 } },
                    "💧": { key: "emoji_water", uv: { u0: 0.0625, v0: 0, u1: 0.078125, v1: 0.015625 } }
                }
            };

            const fireData = sampleEmojiMap.emojis['🔥'];
            if (fireData) {
                emojiCheck.innerHTML = `
                    <div class="success">✅ 找到🔥数据 (使用示例数据):</div>
                    <pre>${JSON.stringify(fireData, null, 2)}</pre>
                    <div class="info">📊 预期UV坐标: (${fireData.uv.u0}, ${fireData.uv.v0}, ${fireData.uv.u1}, ${fireData.uv.v1})</div>
                `;
            } else {
                emojiCheck.innerHTML = `<div class="error">❌ 🔥数据未找到</div>`;
            }
        }

        // 显示atlas信息
        function showAtlasInfo() {
            const atlasInfo = document.getElementById('atlas-info');
            atlasInfo.innerHTML = `
                <div class="info">📊 Atlas预期信息:</div>
                <ul>
                    <li>文件名: atlas.png</li>
                    <li>预期大小: ~795KB</li>
                    <li>预期尺寸: 4096x4096px</li>
                    <li>预期包含: 188个emoji</li>
                    <li>🔥位置: 第4个emoji (x=192, y=0)</li>
                </ul>
                <div class="success">✅ 如果实际文件存在且大小正确，说明atlas没有问题</div>
            `;
        }

        // 页面加载时运行所有检查
        window.addEventListener('load', function() {
            checkFiles();
            loadEmojiMapData();
            showAtlasInfo();

            console.log('🔥 Emoji测试页面已加载');
            console.log('📂 检查文件是否存在于: C:\\Users\\GinoChow\\web3\\funnypixels\\public\\assets\\emoji\\');
            console.log('📋 应该包含: atlas.png 和 emoji_map.json');
        });
    </script>
</body>
</html>
