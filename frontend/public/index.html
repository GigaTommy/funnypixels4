<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FunnyPixels - 像素绘制游戏</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  
  <!-- Leaflet CSS 已移除 - 本项目使用高德地图，不需要Leaflet -->
  
  <!-- Meta tags -->
  <meta name="description" content="FunnyPixels - 一个有趣的像素绘制游戏，与朋友一起在地图上绘制像素">
  <meta name="keywords" content="像素绘制,地图游戏,社交游戏,FunnyPixels">
  <meta name="author" content="FunnyPixels Team">
  
  <!-- Open Graph -->
  <meta property="og:title" content="FunnyPixels - 像素绘制游戏">
  <meta property="og:description" content="与朋友一起在地图上绘制像素，创造独特的艺术作品">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://funnypixels.com">
  
  <!-- Theme color -->
  <meta name="theme-color" content="#3B82F6">

  <!-- PWA Support -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FunnyPixels">
  <link rel="apple-touch-icon" href="/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-192x192.png">

  <!-- Android PWA Support -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- 防止页面缩放（移动端优化） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
