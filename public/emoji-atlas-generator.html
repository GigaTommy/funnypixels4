      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 30px;

      padding: 20px;

    }

      border: none;

      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background: #45a049;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .progress {
      margin: 20px 0;
      padding: 15px;
      background: #e3f2fd;
      border-radius: 4px;
      display: none;
    }
    .progress.show {
      display: block;
    }
    .log {
      background: #263238;
      color: #aed581;
      padding: 15px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      height: 300px;
      overflow-y: auto;
      margin-top: 20px;
    }
    .log-item {

    }

    .log-warn { color: #ffb74d; }
    .log-error { color: #e57373; }
    .preview-container {
      margin-top: 20px;
      text-align: center;
    }
    #atlasCanvas {
      border: 1px solid #ddd;
      max-width: 100%;
      height: auto;
    }
    .download-section {
      margin-top: 20px;
      padding: 20px;
      background: #e8f5e9;
      border-radius: 4px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .stat-card {
      background: #fff;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid #4CAF50;
    }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      color: #4CAF50;
    }
    .stat-label {
      font-size: 14px;
      color: #666;
      margin-top: 5px;
    }

    // 全局状态
    let atlasCanvas, ctx;
    let emojiMapData = null;

    // 日志函数
    function log(message, type = 'info') {
      const logContainer = document.getElementById('logContainer');
      const logItem = document.createElement('div');
      logItem.className = `log-item log-${type}`;
      const timestamp = new Date().toLocaleTimeString();
      logItem.textContent = `[${timestamp}] ${message}`;
      logContainer.appendChild(logItem);
      logContainer.scrollTop = logContainer.scrollHeight;
      console.log(message);
    }

    // 生成 Atlas
    async function generateAtlas() {
      log('🚀 开始生成 Emoji Atlas...', 'info');

      const generateBtn = document.getElementById('generateBtn');
      generateBtn.disabled = true;

      atlasCanvas = document.getElementById('atlasCanvas');
      ctx = atlasCanvas.getContext('2d', { willReadFrequently: true });

      // 清空画布
      ctx.fillStyle = 'rgba(0, 0, 0, 0)';
      ctx.fillRect(0, 0, CONFIG.atlasWidth, CONFIG.atlasHeight);

      // 收集所有 emoji
      const allEmojis = [];
      Object.entries(EMOJI_LIST).forEach(([category, emojis]) => {
        emojis.forEach(emoji => allEmojis.push({ category, emoji }));
      });

      log(`📊 总共 ${allEmojis.length} 个 emoji，容量 ${CONFIG.capacity}`, 'info');
      document.getElementById('totalEmojis').textContent = allEmojis.length;

      // 初始化 emoji 映射数据
      emojiMapData = {
        meta: {
          version: '1.0.0',
          generated: new Date().toISOString(),
          atlasSize: {
            width: CONFIG.atlasWidth,
            height: CONFIG.atlasHeight
          },
          emojiSize: CONFIG.emojiSize,
          totalEmojis: allEmojis.length,
          capacity: CONFIG.capacity
        },
        emojis: {}
      };

      // 🆕 使用 Twemoji CDN 加载彩色 emoji 图像（替代 Canvas fillText 灰色渲染）
      // Twemoji CDN URL 格式：https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/{codepoint}.png

      // 辅助函数：将 emoji 转换为 Twemoji CDN codepoint
      function getEmojiCodepoint(emoji) {
        return [...emoji]
          .map(c => c.codePointAt(0).toString(16))
          .join('-');
      }

      // 辅助函数：加载 Twemoji 图像
      function loadTwemojiImage(emoji) {
        return new Promise((resolve, reject) => {
          const codepoint = getEmojiCodepoint(emoji);
          const img = new Image();
          img.crossOrigin = 'anonymous';

          // Twemoji CDN URL
          img.src = `https://cdn.jsdelivr.net/gh/twitter/twemoji@latest/assets/72x72/${codepoint}.png`;

          img.onload = () => resolve(img);
          img.onerror = (err) => {
            // 降级：尝试使用 Canvas fillText
            log(`⚠️ Twemoji 加载失败: ${emoji}, 使用 fallback`, 'warning');
            resolve(null);
          };
        });
      }

      // 渲染每个 emoji
      for (let i = 0; i < allEmojis.length; i++) {
        const { category, emoji } = allEmojis[i];

        // 计算位置
        const col = i % CONFIG.cols;
        const row = Math.floor(i / CONFIG.cols);
        const x = col * CONFIG.emojiSize;
        const y = row * CONFIG.emojiSize;

        // 🆕 尝试加载 Twemoji 彩色图像
        const twemojiImg = await loadTwemojiImage(emoji);

        if (twemojiImg) {
          // 渲染彩色 Twemoji 图像
          ctx.drawImage(twemojiImg, x, y, CONFIG.emojiSize, CONFIG.emojiSize);
        } else {
          // Fallback: 使用 Canvas fillText（灰色）
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const fontSize = CONFIG.emojiSize * 0.8;
          ctx.font = `${fontSize}px "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif`;
          ctx.fillText(emoji, x + CONFIG.emojiSize / 2, y + CONFIG.emojiSize / 2);
        }

        // 计算 UV 坐标（归一化到 [0, 1]）
        const u0 = x / CONFIG.atlasWidth;
        const v0 = y / CONFIG.atlasHeight;
        const u1 = (x + CONFIG.emojiSize) / CONFIG.atlasWidth;
        const v1 = (y + CONFIG.emojiSize) / CONFIG.atlasHeight;

        // 保存映射数据
        const codepoint = [...emoji].map(c => c.codePointAt(0).toString(16).toUpperCase()).join('-');
        emojiMapData.emojis[emoji] = {
          unicode: emoji,
          codepoint: codepoint,
          uv: { u0, v0, u1, v1 },
          position: {
            x,
            y,
            width: CONFIG.emojiSize,
            height: CONFIG.emojiSize
          },
          index: i,
          category
        };

        // 更新进度
        if (i % 100 === 0 || i === allEmojis.length - 1) {
          const progress = ((i + 1) / allEmojis.length * 100).toFixed(1);
          document.getElementById('progress').textContent = `${progress}%`;
          log(`⏳ 渲染进度: ${i + 1}/${allEmojis.length} (${progress}%)`, 'info');

          // 让浏览器有机会更新 UI
          await new Promise(resolve => setTimeout(resolve, 0));
        }
      }

      log('✅ Emoji Atlas 生成完成！', 'info');
      log(`📦 生成了 ${allEmojis.length} 个 emoji 到 ${CONFIG.atlasWidth}×${CONFIG.atlasHeight} 纹理`, 'info');

      // 启用下载按钮
      document.getElementById('downloadPngBtn').disabled = false;
      document.getElementById('downloadJsonBtn').disabled = false;

      log('💾 可以下载 atlas.png 和 emoji_map.json 了！', 'info');
      generateBtn.disabled = false;
    }

    // 下载 PNG
    function downloadPNG() {
      log('📥 正在生成 PNG 文件...', 'info');
      atlasCanvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'atlas.png';
        a.click();
        URL.revokeObjectURL(url);
        log('✅ atlas.png 下载成功！', 'info');
      }, 'image/png');
    }

    // 下载 JSON
    function downloadJSON() {
      log('📥 正在生成 JSON 文件...', 'info');
      const jsonStr = JSON.stringify(emojiMapData, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'emoji_map.json';
      a.click();
      URL.revokeObjectURL(url);
      log('✅ emoji_map.json 下载成功！', 'info');
      log(`📊 JSON 大小: ${(jsonStr.length / 1024).toFixed(2)} KB`, 'info');
    }

    // 页面加载完成
    window.addEventListener('load', () => {
      log('🎨 Emoji Atlas 生成器已就绪', 'info');
      log('💡 点击"开始生成 Atlas"按钮开始生成', 'info');
      log(`📐 配置: ${CONFIG.atlasWidth}×${CONFIG.atlasHeight}, 每个 emoji ${CONFIG.emojiSize}×${CONFIG.emojiSize}`, 'info');

      // 统计 emoji 数量
      let total = 0;
      Object.entries(EMOJI_LIST).forEach(([category, emojis]) => {
        total += emojis.length;
        log(`  - ${category}: ${emojis.length} 个`, 'info');
      });
      log(`📊 总计: ${total} 个 emoji`, 'info');
    });
